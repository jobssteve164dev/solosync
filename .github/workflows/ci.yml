name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npx @vscode/vsce package --out solosync-ci.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: solosync-vsix
          path: solosync-ci.vsix
