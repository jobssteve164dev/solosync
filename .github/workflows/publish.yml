name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (for example 0.0.2)
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate publishing secrets
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          test -n "$VSCE_PAT" || { echo "::error::VSCE_PAT is empty"; exit 1; }
          test -n "$OVSX_PAT" || { echo "::error::OVSX_PAT is empty"; exit 1; }
          npx --yes ovsx -p "$OVSX_PAT" verify-pat SZLK
      - name: Set release version
        run: npm version "${{ inputs.version }}" --no-git-tag-version
      - run: npm test
      - name: Package extension
        run: npx @vscode/vsce package --out "solosync-${{ inputs.version }}.vsix"
      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "solosync-${{ inputs.version }}.vsix" --skip-duplicate
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx -p "$OVSX_PAT" publish "solosync-${{ inputs.version }}.vsix" --skip-duplicate
      - name: Commit version and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ inputs.version }} [skip ci]"
          git tag "v${{ inputs.version }}"
          git push origin main "v${{ inputs.version }}"
          gh release create "v${{ inputs.version }}" "solosync-${{ inputs.version }}.vsix" --title "v${{ inputs.version }}" --notes-file CHANGELOG.md
      - name: Verify Open VSX availability
        run: |
          for i in {1..30}; do
            if curl -fsS "https://open-vsx.org/api/SZLK/solosync/${{ inputs.version }}" >/tmp/openvsx.json; then
              node -e "const d=require('/tmp/openvsx.json'); if(d.namespace!=='SZLK'||d.name!=='solosync'||d.version!=='${{ inputs.version }}') process.exit(1)"
              exit 0
            fi
            sleep 20
          done
          echo "::warning::Open VSX visibility is still pending"
